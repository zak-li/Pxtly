services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: rwa-keycloak
    restart: unless-stopped
    command: start
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://10.10.10.150:5432/keycloak_db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # HTTP only (TLS is terminated at the reverse proxy in production)
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HTTPS_ENABLED: "false"
      # Hostname — explicit URL avoids Keycloak defaulting to https:// without port
      KC_HOSTNAME_URL: "http://${KEYCLOAK_HOSTNAME}:8080"
      KC_HOSTNAME_ADMIN_URL: "http://${KEYCLOAK_HOSTNAME}:8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Admin credentials (first boot only)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Security hardening
      KC_LOG_LEVEL: INFO
      # Cache (single-node; switch to ispn for cluster)
      KC_CACHE: local
      # Health / metrics
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  keycloak_data:
