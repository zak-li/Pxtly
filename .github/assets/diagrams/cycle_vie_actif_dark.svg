<svg id="infographic" viewBox="0 0 1600 450" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@500;600;700&amp;display=swap');

          .svg-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
          }

          .title-text {
            font-family: 'Cinzel', serif;
            font-weight: 800;
            fill: #FFFFFF;
          }

          .state-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 13px;
            fill: #FFFFFF;
          }

          .transition-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 10px;
            font-weight: 600;
            fill: #FFFFFF;
          }

          .label-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 9px;
            fill: #94A3B8;
          }
        </style>
      </defs>

      <!-- BACKGROUND (Solid clean white background for neutral design) -->
      
      

      <!-- TITLE -->
      <g>
        <text class="title-text" x="800" y="55" text-anchor="middle" letter-spacing="0.5px">
          <tspan font-size="20">TOKENIZED ASSET LIFECYCLE</tspan>
        </text>
      </g>

      <!-- ==================== STATE NODES (NEUTRAL SHARP NO CARD DESCRIPTIONS) ==================== -->

      <!-- Start UML state (Black Ball) -->
      <g id="start-state">
        <circle cx="80" cy="220" r="10" fill="#FFFFFF"/>
      </g>

      <!-- State: ISSUANCE -->
      <g id="node-en-emission">
        <rect x="180" y="190" width="180" height="60" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text class="svg-text state-title" x="270" y="225" text-anchor="middle">EN_EMISSION</text>
      </g>

      <!-- State: ACTIVE -->
      <g id="node-actif">
        <rect x="560" y="190" width="180" height="60" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text class="svg-text state-title" x="650" y="225" text-anchor="middle">ACTIF</text>
      </g>

      <!-- State: FROZEN -->
      <g id="node-gele">
        <rect x="940" y="190" width="180" height="60" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text class="svg-text state-title" x="1030" y="225" text-anchor="middle">GELE</text>
      </g>

      <!-- State: REDEEMED -->
      <g id="node-rembourse">
        <rect x="1200" y="190" width="180" height="60" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text class="svg-text state-title" x="1290" y="225" text-anchor="middle">REMBOURSE</text>
      </g>

      <!-- Final UML state (Bullseye Ball) -->
      <g id="final-state">
        <circle cx="1540" cy="220" r="14" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="1540" cy="220" r="7" fill="#FFFFFF"/>
      </g>

      <!-- 1. Lines and Paths (Stopping at the base of the arrowhead) -->
      <g fill="none" stroke="#FFFFFF" stroke-width="1.5">
        <!-- Init -> ISSUANCE -->
        <path d="M 90,220 L 172,220"/>
        <!-- ISSUANCE -> ACTIVE -->
        <path d="M 360,220 L 552,220"/>
        <!-- ACTIVE -> FROZEN (Top horizontal line) -->
        <path d="M 740,205 L 932,205"/>
        <!-- FROZEN -> ACTIVE (Bottom horizontal line) -->
        <path d="M 940,235 L 748,235"/>
        <!-- ACTIVE -> REDEEMED -->
        <path d="M 650,190 L 650,120 L 1290,120 L 1290,182"/>
        <!-- REDEEMED -> Final State -->
        <path d="M 1380,220 L 1518,220"/>
        <!-- Self transition on ACTIVE -->
        <path d="M 620,250 L 620,305 L 680,305 L 680,258"/>
      </g>

      <!-- 2. Arrow Heads (Polygons with fill, no stroke) -->
      <g fill="#FFFFFF" stroke="none">
        <polygon points="180,220 172,216 172,224"/>
        <polygon points="560,220 552,216 552,224"/>
        <polygon points="940,205 932,201 932,209"/>
        <polygon points="740,235 748,231 748,239"/>
        <polygon points="1290,190 1286,182 1294,182"/>
        <polygon points="1526,220 1518,216 1518,224"/>
        <polygon points="680,250 676,258 684,258"/>
      </g>

      <!-- 3. Labels and Backdrops (Plain text with fill, no stroke, with uniform padding) -->
      <g fill="#FFFFFF" stroke="none">
        <!-- Init label -->
        <text class="svg-text transition-text" x="135" y="210" text-anchor="middle">init</text>

        <!-- ISSUANCE -> ACTIVE label -->
        <text class="svg-text transition-text" x="460" y="210" text-anchor="middle">TokenizeAsset()</text>
        <text class="svg-text label-text" x="460" y="195" text-anchor="middle">Guard: ISIN and LEI Format OK</text>

        <!-- ACTIVE -> FROZEN label (Top) -->
        <text class="svg-text transition-text" x="840" y="195" text-anchor="middle">FreezeAsset()</text>
        <text class="svg-text label-text" x="840" y="180" text-anchor="middle">Role: REGULATOR</text>

        <!-- FROZEN -> ACTIVE label (Bottom) -->
        <text class="svg-text transition-text" x="840" y="252" text-anchor="middle">UnfreezeAsset()</text>
        <text class="svg-text label-text" x="840" y="267" text-anchor="middle">Role: REGULATOR</text>

        <!-- ACTIVE -> REDEEMED label -->
        <text class="svg-text transition-text" x="970" y="110" text-anchor="middle">Automated Status Update</text>
        <text class="svg-text label-text" x="970" y="95" text-anchor="middle">Guard: Asset Status == REMBOURSE</text>

        <!-- Self transition label -->
        <text class="svg-text transition-text" x="650" y="325" text-anchor="middle">TransferAsset()</text>
        <text class="svg-text label-text" x="650" y="340" text-anchor="middle">Guard: AML Score and MiCA</text>
      </g>
    </svg>