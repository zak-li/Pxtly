name: pxtly
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - pxtly-api:latest
    image: pxtly-api:latest
    container_name: pxtly-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - FABRIC_PEER_BIN=/usr/local/bin/peer
      - FABRIC_CFG_PATH_BASE=/etc/hyperledger/fabric
      - FABRIC_CRYPTO_CONFIG=/app/fabric/crypto-config
    volumes:
      # Pinned CA used to validate Keycloak's self-signed TLS cert.
      # Path inside the container must match KEYCLOAK_CA_CERT_PATH in .env.
      - ./stack/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
      # Fabric identity wallet and crypto material — excluded from the image
      # by .dockerignore, so they must be mounted at runtime.
      - ./network/wallets:/app/fabric/wallets:ro
      - ./crypto-config:/app/fabric/crypto-config:ro
      # Fabric peer binary
      - /home/zakaria/go/src/github.com/hyperledger/fabric-samples/bin/peer:/usr/local/bin/peer:ro
      # Fabric config (core.yaml)
      - /home/zakaria/go/src/github.com/hyperledger/fabric-samples/config:/etc/hyperledger/fabric:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - pxtly-celery-worker:latest
    image: pxtly-celery-worker:latest
    container_name: pxtly-celery-worker
    restart: unless-stopped
    command: celery -A core.core.celery_app worker -l INFO --concurrency=2
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./stack/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
    # Celery doesn't expose HTTP — use `inspect ping` which round-trips through
    # the broker and proves the worker is actually consuming.
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.core.celery_app inspect ping -d celery@$$(hostname) -t 5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 192M
    # Celery needs Redis (broker) and Postgres (result backend / DB tasks).
    # Both are expected to be running externally or added as services here.
    # No dependency on `api` — the worker connects to the broker directly.
    networks:
      - pxtly-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pxtly-network:
    driver: bridge
    # ── Network Architecture ─────────────────────────────────────────────
    # The platform uses THREE separate Docker networks by design:
    #   1. pxtly-network       — API + Celery (this file)
    #   2. rwa-network       — Fabric peers, orderer, CouchDB, Neo4j
    #                          (fabric/docker/docker-compose.yaml)
    #   3. (default)         — Keycloak
    #                          (stack/keycloak/docker-compose.keycloak.yml)
    #
    # Cross-network communication goes through the HOST IP (10.10.10.150)
    # via published ports. This is intentional: Fabric and Keycloak are
    # managed by separate compose files with independent lifecycles.
