apiVersion: 1

providers:
  - name: pxtly
    orgId: 1
    # Empty folder = root: the dashboard appears directly in the Dashboards
    # list with no enclosing folder. A previous `folder` + `folderUid: pxtly`
    # caused a click-through bug because the folder UID collided with the
    # dashboard UID (both `pxtly`).
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
